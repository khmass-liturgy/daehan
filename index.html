<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>대한가축약품 조회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
<style>
:root {
  --bg:#0f1117; --bg2:#181c26; --bg3:#1e2330;
  --border:#252b3b; --border2:#2e3650;
  --text:#e8eaf0; --text2:#8b90a0; --text3:#4a5068;
  --blue:#4f8ef7; --green:#3ecf8e; --amber:#f0a050;
  --red:#e05555; --purple:#9b7ff0; --teal:#36c4a0;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:14px;min-height:100vh}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
#login-screen.hide{display:none}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;width:320px;text-align:center}
.login-logo{font-size:20px;font-weight:700;margin-bottom:6px}
.login-logo span{color:var(--blue)}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.login-box input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:var(--blue);border:none;border-radius:8px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:hover{opacity:.88}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}
.login-cloud{margin-top:16px;font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.4}}

#app{display:none;flex-direction:column;min-height:100vh}
#app.show{display:flex}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700}.logo span{color:var(--blue)}
.badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}

nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:12px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

main{flex:1;padding:16px;max-width:1100px;width:100%;margin:0 auto}

.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--blue)}
.search-btn{background:var(--blue);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-btn:hover{opacity:.88}
.toggle-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap}
.toggle-btn.on{background:var(--teal);border-color:var(--teal);color:#fff}
select.filter{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;cursor:pointer}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.b::before{background:var(--blue)}.kpi.g::before{background:var(--green)}
.kpi.a::before{background:var(--amber)}.kpi.p::before{background:var(--purple)}
.kpi-lbl{font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
th{font-size:10px;color:var(--text3);text-align:left;padding:0 10px 8px;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--bg3);font-size:12px;color:var(--text);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.tag-매출{background:#1a2d4f;color:var(--blue)}
.tag-매입{background:#2d2010;color:var(--amber)}
.tag-수금{background:#0f2d1f;color:var(--green)}
.tag-지급{background:#2d1010;color:var(--red)}
.tag-재고있음{background:#0f2d1f;color:var(--green)}
.tag-재고없음{background:#2d1010;color:var(--red)}
.tag-외상{background:#1e1e3a;color:var(--purple)}
.tag-현금{background:#1a2d1a;color:var(--green)}

.empty{text-align:center;padding:48px 0;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:32px;color:var(--text3)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.pos{color:var(--amber)}.neg{color:var(--green)}.zero{color:var(--text3)}
@media(max-width:600px){.hide-mobile{display:none}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">대한<span>가축약품</span></div>
    <div class="login-sub">클라우드 조회 시스템</div>
    <input type="password" id="token-input" placeholder="접속 코드 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">접속</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-cloud"><span class="dot"></span> Firebase 클라우드 · 24시간 조회 가능</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">대한<span>가축약품</span></div>
    <div class="badge" id="data-date">-</div>
  </header>

  <nav>
    <div class="nav-tab active" onclick="showTab('stock')">재고 조회</div>
    <div class="nav-tab" onclick="showTab('balance')">거래처 잔액</div>
    <div class="nav-tab" onclick="showTab('txn')">거래내역</div>
    <div class="nav-tab" onclick="showTab('inactive')">미거래 관리</div>
    <div class="nav-tab" onclick="showTab('info')">거래처 정보</div>
  </nav>

  <main>
    <div id="tab-stock">
      <div class="search-row">
        <button class="toggle-btn on" id="stock-mode-all" onclick="setStockMode('all')">전체 재고</button>
        <button class="toggle-btn" id="stock-mode-mfg" onclick="setStockMode('mfg')">제조사별</button>
        <button class="toggle-btn" id="stock-mode-cust" onclick="setStockMode('cust')">거래처 구매내역</button>
      </div>
      
      <!-- 전체/제조사 모드 -->
      <div id="stock-search-normal" class="search-row">
        <input class="search-input" id="stock-q" placeholder="품명 또는 제조사 검색..." onkeydown="if(event.key==='Enter')searchStock()">
        <select class="filter" id="stock-mfg" onchange="searchStock()" style="display:none">
          <option value="">제조사 선택</option>
        </select>
        <button class="toggle-btn" id="stock-only-btn" onclick="toggleStockOnly()">재고있음만</button>
        <button class="search-btn" onclick="searchStock()">검색</button>
      </div>
      
      <!-- 제품 축종 필터 -->
      <div id="stock-species-row" class="search-row">
        <button class="toggle-btn on" id="sp-all" onclick="setStockSpecies('all')">축종 전체</button>
        <button class="toggle-btn" id="sp-양계" onclick="setStockSpecies('양계')">🐔 양계</button>
        <button class="toggle-btn" id="sp-양돈" onclick="setStockSpecies('양돈')">🐷 양돈</button>
        <button class="toggle-btn" id="sp-축우" onclick="setStockSpecies('축우')">🐄 축우</button>
        <button class="toggle-btn" id="sp-공통" onclick="setStockSpecies('공통')">공통</button>
        <button class="toggle-btn" id="sp-미지정" onclick="setStockSpecies('미지정')">미지정</button>
      </div>
      
      <!-- 거래처 구매내역 모드 -->
      <div id="stock-search-cust" class="search-row" style="display:none">
        <input class="search-input" id="stock-cust-q" placeholder="거래처명 입력 (예: 유월농장)" onkeydown="if(event.key==='Enter')searchCustProducts()">
        <button class="search-btn" onclick="searchCustProducts()">구매내역 조회</button>
      </div>
      
      <div id="stock-result"></div>
    </div>

    <div id="tab-balance" style="display:none">
      <div class="search-row">
        <input class="search-input" id="bal-q" placeholder="거래처명 검색..." onkeydown="if(event.key==='Enter')searchBalance()">
        <button class="toggle-btn" id="bal-unpaid-btn" onclick="toggleUnpaid()">미수금만</button>
        <button class="search-btn" onclick="searchBalance()">검색</button>
      </div>
      <div id="balance-result"></div>
    </div>

    <div id="tab-txn" style="display:none">
      <div class="search-row">
        <input class="search-input" id="txn-company" placeholder="거래처명..." onkeydown="if(event.key==='Enter')searchTxn()">
        <input class="search-input" id="txn-product" placeholder="품명..." onkeydown="if(event.key==='Enter')searchTxn()">
        <select class="filter" id="txn-acct" onchange="searchTxn()">
          <option value="">전체</option>
          <option value="매출">매출</option>
          <option value="매입">매입</option>
          <option value="수금">수금</option>
          <option value="지급">지급</option>
        </select>
        <button class="search-btn" onclick="searchTxn()">검색</button>
      </div>
      <div id="txn-result"></div>
    </div>

    <div id="tab-inactive" style="display:none">
      <div class="search-row">
        <button class="toggle-btn" id="inact-30-btn" onclick="setInactivePeriod(30)">30일 이상</button>
        <button class="toggle-btn on" id="inact-60-btn" onclick="setInactivePeriod(60)">60일 이상</button>
        <button class="toggle-btn" id="inact-90-btn" onclick="setInactivePeriod(90)">90일 이상</button>
        <button class="toggle-btn" id="inact-120-btn" onclick="setInactivePeriod(120)">120일 이상</button>
      </div>
      <div class="search-row">
        <button class="toggle-btn on" id="inact-cat-all" onclick="setCategory('all')">전체</button>
        <button class="toggle-btn" id="inact-cat-양계" onclick="setCategory('양계')">양계</button>
        <button class="toggle-btn" id="inact-cat-양돈" onclick="setCategory('양돈')">양돈</button>
        <button class="toggle-btn" id="inact-cat-축우" onclick="setCategory('축우')">축우</button>
        <button class="toggle-btn" id="inact-cat-양견" onclick="setCategory('양견')">양견</button>
        <button class="toggle-btn" id="inact-cat-동물병원/유통" onclick="setCategory('동물병원/유통')">동물병원</button>
        <button class="toggle-btn" id="inact-cat-미분류" onclick="setCategory('미분류')">미분류</button>
      </div>
      <div id="inactive-result"></div>
    </div>

    <div id="tab-info" style="display:none">
      <div class="search-row">
        <input class="search-input" id="info-q" placeholder="거래처명 검색..." onkeydown="if(event.key==='Enter')searchInfo()">
        <button class="search-btn" onclick="searchInfo()">검색</button>
      </div>
      <div id="info-result"></div>
    </div>
  </main>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, orderBy, limit, doc, getDoc, setDoc, deleteDoc } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ⚠️ Firebase 설정 - 자기 값으로 교체
const firebaseConfig = {
  apiKey: "여기에_apiKey_붙여넣기",
  authDomain: "daehan-adb1d.firebaseapp.com",
  projectId: "daehan-adb1d",
  storageBucket: "daehan-adb1d.firebasestorage.app",
  messagingSenderId: "여기에_messagingSenderId",
  appId: "여기에_appId"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 전역으로 노출
window.fbdb = db;
window.fbFuncs = { collection, query, where, getDocs, orderBy, limit, doc, getDoc, setDoc, deleteDoc };

// 초기화 완료 알림
window.dispatchEvent(new Event('fbready'));
</script>

<script>
// ── 상태 ─────────────────────────────────────────
let TOKEN = '';
let stockOnly = false, unpaidOnly = false;
const ACCESS_CODE = 'daehan2024';  // 접속 코드 (원하면 변경)
let dbReady = false;

window.addEventListener('fbready', () => { dbReady = true; });

// ── 로그인 ────────────────────────────────────────
function doLogin() {
  const t = document.getElementById('token-input').value.trim();
  if (t !== ACCESS_CODE) {
    document.getElementById('login-err').textContent = '접속 코드가 틀렸습니다';
    return;
  }
  if (!dbReady) {
    document.getElementById('login-err').textContent = '연결 중... 잠시 후 다시 시도하세요';
    setTimeout(() => { if (dbReady) doLogin(); }, 1500);
    return;
  }
  document.getElementById('login-screen').classList.add('hide');
  document.getElementById('app').classList.add('show');
  document.getElementById('data-date').textContent = new Date().toLocaleDateString('ko-KR');
  loadCategoryMap();  // 축종 매핑 로드 (백그라운드)
  loadProductSpecies();  // 제품 축종 로드
  searchStock();
}
window.doLogin = doLogin;

// ── 유틸 ─────────────────────────────────────────
function fmt억(n) {
  n = +n || 0;
  if (n >= 1e8) return (n/1e8).toFixed(1) + '억';
  if (n >= 1e4) return Math.round(n/1e4).toLocaleString() + '만';
  return n.toLocaleString();
}
function fmtNum(n) { return (+n||0).toLocaleString(); }
function loading(id) { document.getElementById(id).innerHTML = '<div class="loading"><span class="spinner"></span>클라우드 조회 중...</div>'; }
function empty(id) { document.getElementById(id).innerHTML = '<div class="empty">검색 결과가 없습니다</div>'; }

// ── 탭 ───────────────────────────────────────────
function showTab(name) {
  ['stock','balance','txn','inactive','info'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((el,i) => {
    el.classList.toggle('active', ['stock','balance','txn','inactive','info'][i] === name);
  });
  if (name === 'inactive' && !document.querySelector('#inactive-result table')) searchInactive();
}
window.showTab = showTab;

// ── 재고 조회 ─────────────────────────────────────
let stockMode = 'all';
let stockSpecies = 'all';  // 제품 축종 필터
let mfgListLoaded = false;

// 제품 축종 수동 매핑 캐시 (Firestore)
let 제품축종 = {};  // { 품명: '양계' | '양돈' | '축우' | '공통' }

// 제품 축종 매핑 로드
async function loadProductSpecies() {
  const { collection, query, getDocs, limit } = window.fbFuncs;
  try {
    const snap = await getDocs(query(collection(window.fbdb, '제품축종'), limit(3000)));
    제품축종 = {};
    snap.docs.forEach(d => {
      const r = d.data();
      if (r.품명 && r.축종) 제품축종[r.품명] = r.축종;
    });
    console.log(`제품축종 로드: ${Object.keys(제품축종).length}개`);
  } catch(e) {
    console.warn('제품축종 로드 실패', e);
  }
}

// 제품 축종 저장
async function saveProductSpecies(품명, 축종) {
  const { doc, setDoc, deleteDoc } = window.fbFuncs;
  const safeId = 품명.replace(/\//g,'_').replace(/\./g,'_').replace(/#/g,'_').replace(/\[/g,'_').replace(/\]/g,'_');
  const ref = doc(window.fbdb, '제품축종', safeId);
  try {
    if (축종 === 'clear') {
      await deleteDoc(ref);
      delete 제품축종[품명];
    } else {
      await setDoc(ref, { 품명, 축종, 갱신일시: new Date().toISOString() });
      제품축종[품명] = 축종;
    }
    return true;
  } catch(e) {
    alert('저장 실패: ' + e.message);
    return false;
  }
}
window.saveProductSpecies = saveProductSpecies;

// 제품 축종 편집 팝업
function editProductSpecies(품명) {
  const 현재 = 제품축종[품명] || '미지정';
  const options = ['양계','양돈','축우','공통'];
  const 색상map = { '양계':'#f0a050','양돈':'#e05555','축우':'#7F77DD','공통':'#36c4a0','미지정':'var(--text3)' };
  const safe = 품명.replace(/'/g,"\\'");
  
  const html = `
    <div id="prod-sp-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px" onclick="closeProdSp(event)">
      <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;max-width:400px;width:100%" onclick="event.stopPropagation()">
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">${품명}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:18px">현재 축종: <span style="color:${색상map[현재]};font-weight:600">${현재}</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${options.map(opt => `
            <button onclick="doSetProductSpecies('${safe}','${opt}')" 
              style="padding:12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:${색상map[opt]};font-size:14px;font-weight:600;cursor:pointer;${현재===opt?'border-color:'+색상map[opt]+';background:'+색상map[opt]+'22':''}">
              ${opt}
            </button>
          `).join('')}
        </div>
        <button onclick="doSetProductSpecies('${safe}','clear')" 
          style="width:100%;margin-top:12px;padding:9px;border-radius:8px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:12px;cursor:pointer">
          미지정으로 되돌리기
        </button>
        <button onclick="closeProdSp()" 
          style="width:100%;margin-top:8px;padding:9px;border-radius:8px;background:var(--bg3);border:none;color:var(--text2);font-size:12px;cursor:pointer">닫기</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}
window.editProductSpecies = editProductSpecies;

async function doSetProductSpecies(품명, 축종) {
  const ok = await saveProductSpecies(품명, 축종);
  if (ok) { closeProdSp(); searchStock(); }
}
window.doSetProductSpecies = doSetProductSpecies;

function closeProdSp(e) {
  if (e && e.target.id !== 'prod-sp-modal') return;
  const m = document.getElementById('prod-sp-modal');
  if (m) m.remove();
}
window.closeProdSp = closeProdSp;

function setStockSpecies(sp) {
  stockSpecies = sp;
  ['all','양계','양돈','축우','공통','미지정'].forEach(s => {
    const btn = document.getElementById('sp-'+s);
    if (btn) btn.classList.toggle('on', s === sp);
  });
  searchStock();
}
window.setStockSpecies = setStockSpecies;

function setStockMode(mode) {
  stockMode = mode;
  ['all','mfg','cust'].forEach(m => {
    document.getElementById('stock-mode-'+m).classList.toggle('on', m === mode);
  });
  
  const normalRow = document.getElementById('stock-search-normal');
  const custRow = document.getElementById('stock-search-cust');
  const speciesRow = document.getElementById('stock-species-row');
  const mfgSelect = document.getElementById('stock-mfg');
  const qInput = document.getElementById('stock-q');
  
  if (mode === 'cust') {
    normalRow.style.display = 'none';
    custRow.style.display = 'flex';
    speciesRow.style.display = 'none';
    document.getElementById('stock-result').innerHTML = '<div class="empty">거래처명을 입력하고 조회하세요</div>';
  } else {
    normalRow.style.display = 'flex';
    custRow.style.display = 'none';
    speciesRow.style.display = 'flex';
    if (mode === 'mfg') {
      mfgSelect.style.display = '';
      qInput.placeholder = '품명 검색 (제조사 선택과 함께)';
      loadMfgList();
    } else {
      mfgSelect.style.display = 'none';
      mfgSelect.value = '';
      qInput.placeholder = '품명 또는 제조사 검색...';
    }
    searchStock();
  }
}
window.setStockMode = setStockMode;

// 제조사 목록 로드 (드롭다운 채우기)
async function loadMfgList() {
  if (mfgListLoaded) return;
  const { collection, query, getDocs, limit } = window.fbFuncs;
  try {
    const snap = await getDocs(query(collection(window.fbdb, '제품'), limit(1200)));
    const mfgs = new Set();
    snap.docs.forEach(d => {
      const m = d.data().대분류;
      if (m) mfgs.add(m);
    });
    const sorted = [...mfgs].sort((a,b) => a.localeCompare(b));
    const select = document.getElementById('stock-mfg');
    select.innerHTML = '<option value="">제조사 전체</option>' + 
      sorted.map(m => `<option value="${m}">${m}</option>`).join('');
    mfgListLoaded = true;
  } catch(e) { console.warn('제조사 목록 로드 실패', e); }
}

async function searchStock() {
  const q = document.getElementById('stock-q').value.trim().toLowerCase();
  const mfg = document.getElementById('stock-mfg').value;
  loading('stock-result');
  
  const { collection, query, getDocs, where, limit } = window.fbFuncs;
  const coll = collection(window.fbdb, '제품');
  
  try {
    let snap;
    if (stockOnly) {
      snap = await getDocs(query(coll, where('현재재고', '>', 0), limit(1200)));
    } else {
      snap = await getDocs(query(coll, limit(1200)));
    }
    
    let items = snap.docs.map(d => d.data());
    
    // 제조사 필터 (제조사별 모드)
    if (mfg) {
      items = items.filter(r => r.대분류 === mfg);
    }
    
    // 품명 검색
    if (q) {
      items = items.filter(r => 
        (r.품명||'').toLowerCase().includes(q) || 
        (r.대분류||'').toLowerCase().includes(q) ||
        (r.품명초성||'').includes(q)
      );
    }
    
    // 제품 축종 필터
    if (stockSpecies !== 'all') {
      items = items.filter(r => {
        const sp = 제품축종[r.품명] || '미지정';
        return sp === stockSpecies;
      });
    }
    
    // 재고 많은 순 정렬
    items.sort((a, b) => {
      const aStock = +a.현재재고 || 0;
      const bStock = +b.현재재고 || 0;
      if (aStock !== bStock) return bStock - aStock;
      return (a.품명||'').localeCompare(b.품명||'');
    });
    
    if (!items.length) { empty('stock-result'); return; }
    
    const 색상map = { '양계':'#f0a050','양돈':'#e05555','축우':'#7F77DD','공통':'#36c4a0','미지정':'var(--text3)' };
    
    const rows = items.slice(0, 300).map(r => {
      const has = r.현재재고 > 0;
      const sp = 제품축종[r.품명] || '미지정';
      const spColor = 색상map[sp];
      const safe = (r.품명||'').replace(/'/g,"\\'");
      return `<tr>
        <td>${r.대분류||''}</td>
        <td><strong>${r.품명||''}</strong></td>
        <td>
          <span onclick="editProductSpecies('${safe}')" title="클릭하여 축종 지정"
            style="cursor:pointer;font-size:10px;padding:2px 7px;border-radius:8px;background:${spColor}22;color:${spColor};font-weight:600;border:1px solid ${sp!=='미지정'?spColor:'transparent'}">
            ${sp}${sp!=='미지정'?' ✎':' +'}
          </span>
        </td>
        <td class="num"><span class="tag ${has?'tag-재고있음':'tag-재고없음'}">${fmtNum(r.현재재고)}</span></td>
        <td class="num hide-mobile">${fmtNum(r.판매소매단가)}</td>
        <td class="num hide-mobile">${fmtNum(r.구매최종단가)}</td>
      </tr>`;
    }).join('');
    
    const 제목 = mfg ? `[${mfg}] ` : '';
    const 축종제목 = stockSpecies !== 'all' ? `[${stockSpecies}] ` : '';
    document.getElementById('stock-result').innerHTML = `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">${제목}${축종제목}${items.length}개 품목 · 축종 태그 클릭하여 지정</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>제조사</th><th>품명</th><th>축종</th><th class="num">현재재고 ▼</th><th class="num hide-mobile">소매단가</th><th class="num hide-mobile">구매단가</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  } catch(e) {
    document.getElementById('stock-result').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}
window.searchStock = searchStock;

// 거래처 구매내역 조회
async function searchCustProducts() {
  const company = document.getElementById('stock-cust-q').value.trim();
  if (!company) {
    document.getElementById('stock-result').innerHTML = '<div class="empty">거래처명을 입력하세요</div>';
    return;
  }
  loading('stock-result');
  
  const { collection, query, getDocs, where, orderBy, limit } = window.fbFuncs;
  const coll = collection(window.fbdb, '전표_세부');
  
  try {
    // 해당 거래처의 매출(=거래처가 구매) 세부 내역
    const snap = await getDocs(query(coll, where('회사','==',company), where('계정','==','매출'), orderBy('날짜','desc'), limit(3000)));
    let details = snap.docs.map(d => d.data());
    
    // 회사명 부분일치 재시도 (정확 매칭 실패 시)
    if (!details.length) {
      const allSnap = await getDocs(query(coll, where('계정','==','매출'), orderBy('날짜','desc'), limit(5000)));
      const kw = company.toLowerCase();
      details = allSnap.docs.map(d => d.data()).filter(r => (r.회사||'').toLowerCase().includes(kw));
    }
    
    if (!details.length) { 
      document.getElementById('stock-result').innerHTML = `<div class="empty">${company}의 구매 내역이 없습니다</div>`;
      return; 
    }
    
    const 실제거래처 = details[0].회사;
    
    // 품명별 집계
    const prodMap = new Map();
    details.forEach(r => {
      const key = r.품명 || '(미상)';
      const cur = prodMap.get(key) || { 품명:key, 대분류:r.대분류||'', 구매횟수:0, 총수량:0, 최근구매:'', 최근단가:0 };
      cur.구매횟수 += 1;
      cur.총수량 += (+r.수량||0);
      if ((r.날짜||'') > cur.최근구매) {
        cur.최근구매 = r.날짜 || '';
        cur.최근단가 = +r.단가 || 0;
      }
      prodMap.set(key, cur);
    });
    
    let items = [...prodMap.values()];
    items.sort((a,b) => b.구매횟수 - a.구매횟수);
    
    const 총품목 = items.length;
    const 총구매횟수 = details.length;
    
    const rows = items.slice(0, 300).map(r => `<tr>
      <td>${r.대분류||''}</td>
      <td><strong>${r.품명||''}</strong></td>
      <td class="num">${r.구매횟수}회</td>
      <td class="num">${fmtNum(r.총수량)}</td>
      <td class="num hide-mobile">${fmtNum(r.최근단가)}</td>
      <td style="font-size:11px;color:var(--text3)">${r.최근구매||''}</td>
    </tr>`).join('');
    
    document.getElementById('stock-result').innerHTML = `
      <div class="kpi-grid" style="margin-bottom:14px">
        <div class="kpi b" style="grid-column:span 2">
          <div class="kpi-lbl">거래처</div>
          <div class="kpi-val" style="font-size:18px">${실제거래처}</div>
          <div class="kpi-sub">구매 제품 분석</div>
        </div>
        <div class="kpi g">
          <div class="kpi-lbl">구매 품목 수</div>
          <div class="kpi-val">${총품목}<span style="font-size:14px"> 종</span></div>
        </div>
        <div class="kpi p">
          <div class="kpi-lbl">총 구매 횟수</div>
          <div class="kpi-val">${총구매횟수}<span style="font-size:14px"> 회</span></div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">${총품목}개 품목 · 자주 구매한 순</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>제조사</th><th>품명</th><th class="num">구매횟수 ▼</th><th class="num">총수량</th><th class="num hide-mobile">최근단가</th><th>최근구매일</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  } catch(e) {
    document.getElementById('stock-result').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    console.error(e);
  }
}
window.searchCustProducts = searchCustProducts;

  searchStock();

// ── 거래처 잔액 (잔액 컬렉션 사용 - 전체 기간 반영) ─
async function searchBalance() {
  const q = document.getElementById('bal-q').value.trim().toLowerCase();
  loading('balance-result');
  
  const { collection, query, getDocs, orderBy, limit, where } = window.fbFuncs;
  
  try {
    // 잔액 컬렉션 (미리 전체 기간으로 계산되어 저장됨) + 거래처 마스터 병렬 조회
    const balColl = collection(window.fbdb, '잔액');
    const custColl = collection(window.fbdb, '거래처');
    const [balSnap, custSnap] = await Promise.all([
      getDocs(query(balColl, orderBy('잔액', 'desc'), limit(1000))),
      getDocs(query(custColl, limit(2000)))
    ]);
    
    // 거래처 마스터 → 회사명별 이름/전화 매핑
    const custMap = new Map();
    custSnap.docs.forEach(d => {
      const r = d.data();
      if (r.회사) custMap.set(r.회사, { 이름: r.이름 || '', 전화: r.전화1 || '' });
    });
    
    let items = balSnap.docs.map(d => {
      const r = d.data();
      const info = custMap.get(r.회사) || {};
      return {
        ...r,
        이름: info.이름,
        전화: info.전화,
      };
    });
    
    // 필터 (회사명 + 담당자 이름 검색)
    if (q) items = items.filter(r => 
      (r.회사||'').toLowerCase().includes(q) ||
      (r.이름||'').toLowerCase().includes(q)
    );
    if (unpaidOnly) items = items.filter(r => r.잔액 > 0);
    
    if (!items.length) { empty('balance-result'); return; }
    
    const rows = items.slice(0, 300).map(r => {
      const cls = r.잔액 > 0 ? 'pos' : r.잔액 < 0 ? 'neg' : 'zero';
      const safeName = (r.회사||'').replace(/'/g,"\\'");
      const 이름표시 = r.이름 ? `<span style="font-size:11px;color:var(--text3);margin-left:6px">(${r.이름})</span>` : '';
      return `<tr>
        <td onclick="goTxnByCompany('${safeName}')" style="cursor:pointer" title="거래내역 보기">
          <strong style="color:var(--blue)">${r.회사||''}</strong>${이름표시}
          <span style="font-size:10px;color:var(--text3);margin-left:6px">📋</span>
        </td>
        <td class="num">${fmt억(r.총매출)}</td>
        <td class="num">${fmt억(r.총수금)}</td>
        <td class="num ${cls}" onclick="showBalanceDetail('${safeName}', ${r.총매출}, ${r.총수금}, ${r.잔액})" style="cursor:pointer" title="잔액 상세 보기">
          <strong>${fmtNum(r.잔액)}</strong>
          <span style="font-size:10px;color:var(--text3);margin-left:4px">🔍</span>
        </td>
        <td class="hide-mobile" style="font-size:11px;color:var(--text3)">${r.최종매출일||''}</td>
      </tr>`;
    }).join('');
    
    document.getElementById('balance-result').innerHTML = `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">
        ${items.length}개 거래처 · 회사명/담당자명 검색 · <span style="color:var(--blue)">거래처명</span>=거래내역 · <span style="color:var(--amber)">잔액</span>=상세보기
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>거래처 (담당자)</th><th class="num">총 매출</th><th class="num">총 수금</th><th class="num">잔액 ▼</th><th class="hide-mobile">최종거래일</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  } catch(e) {
    document.getElementById('balance-result').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    console.error(e);
  }
}

// ── 거래내역 ──────────────────────────────────────
async function searchTxn() {
  const company = document.getElementById('txn-company').value.trim();
  const product = document.getElementById('txn-product').value.trim().toLowerCase();
  const acct    = document.getElementById('txn-acct').value;
  
  if (!company && !product && !acct) {
    document.getElementById('txn-result').innerHTML = '<div class="empty">거래처, 품명, 또는 구분 중 하나 이상 선택하세요</div>';
    return;
  }
  
  loading('txn-result');
  
  const { collection, query, getDocs, where, orderBy, limit } = window.fbFuncs;
  const coll = collection(window.fbdb, '전표_세부');
  
  try {
    let items = [];
    let matchedCompanies = new Set();
    
    if (company) {
      // 회사명 부분 일치 검색 (Firestore는 == 만 되므로 클라이언트 필터링)
      // 1단계: 계정 필터가 있으면 그 조건으로만 조회, 없으면 전체 최근 순
      let constraints = [];
      if (acct) constraints.push(where('계정', '==', acct));
      constraints.push(orderBy('날짜', 'desc'));
      constraints.push(limit(5000));
      
      const snap = await getDocs(query(coll, ...constraints));
      const allDocs = snap.docs.map(d => d.data());
      
      // 회사명 부분 일치 필터
      const kw = company.toLowerCase();
      items = allDocs.filter(r => (r.회사||'').toLowerCase().includes(kw));
      items.forEach(r => matchedCompanies.add(r.회사));
    } else {
      // 회사 조건 없이 계정만 조회
      let constraints = [];
      if (acct) constraints.push(where('계정', '==', acct));
      constraints.push(orderBy('날짜', 'desc'));
      constraints.push(limit(500));
      const snap = await getDocs(query(coll, ...constraints));
      items = snap.docs.map(d => d.data());
    }
    
    // 품명 필터
    if (product) items = items.filter(r => (r.품명||'').toLowerCase().includes(product));
    
    if (!items.length) { empty('txn-result'); return; }
    
    // 회사별 잔액 계산 (매칭된 회사가 정확히 1곳일 때만)
    let showBalance = false;
    let balanceMap = {};
    let targetCompany = '';
    
    if (matchedCompanies.size === 1) {
      targetCompany = [...matchedCompanies][0];
      const headColl = collection(window.fbdb, '전표_묶음');
      const hsnap = await getDocs(query(headColl, where('회사','==',targetCompany), orderBy('날짜','asc'), limit(5000)));
      const headers = hsnap.docs.map(d => d.data());
      headers.sort((a,b) => {
        if (a.날짜 !== b.날짜) return a.날짜.localeCompare(b.날짜);
        return (a.전표번호||'').localeCompare(b.전표번호||'');
      });
      let running = 0;
      headers.forEach(r => {
        // 외상 매출만 미수금에 반영 (현금/무상 매출은 즉시 결제되어 제외)
        if (r.계정 === '매출' && r.결재수단 === '외상') running += (+r.합계||0);
        else if (r.계정 === '수금') running -= (+r.입금액||0);
        balanceMap[r.전표번호] = running;
      });
      showBalance = true;
    }
    
    const rows = items.slice(0, 500).map(r => {
      const tagCls = `tag-${r.계정}`;
      const bal = balanceMap[r.전표번호];
      const balCell = showBalance 
        ? (bal!==undefined ? `<td class="num ${bal>0?'pos':bal<0?'neg':'zero'}"><strong>${fmtNum(bal)}</strong></td>` : `<td class="num" style="color:var(--text3)">-</td>`)
        : '';
      return `<tr>
        <td style="color:var(--text3)">${r.날짜||''}</td>
        <td><strong>${r.회사||''}</strong></td>
        <td><span class="tag ${tagCls}">${r.계정||''}</span></td>
        <td>${r.품명||'-'}</td>
        <td class="num hide-mobile">${r.수량>0?fmtNum(r.수량):'-'}</td>
        <td class="num hide-mobile">${r.단가>0?fmtNum(r.단가):'-'}</td>
        <td class="num">${r.공급가액>0?fmtNum(r.공급가액):'-'}</td>
        ${balCell}
      </tr>`;
    }).join('');
    
    const balHeader = showBalance ? '<th class="num">잔액</th>' : '';
    
    // 안내 메시지
    let infoMsg = `${items.length}건`;
    if (matchedCompanies.size > 1) {
      infoMsg += ` · ${matchedCompanies.size}개 거래처 매칭 (정확한 이름 입력시 잔액 표시)`;
    } else if (targetCompany && targetCompany !== company) {
      infoMsg += ` · 매칭된 거래처: ${targetCompany}`;
    }
    
    document.getElementById('txn-result').innerHTML = `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">${infoMsg}</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>날짜</th><th>거래처</th><th>구분</th><th>품명</th><th class="num hide-mobile">수량</th><th class="num hide-mobile">단가</th><th class="num">금액</th>${balHeader}</tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  } catch(e) {
    document.getElementById('txn-result').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    console.error(e);
  }
}

// ── 미거래 관리 ────────────────────────────────
let inactiveDays = 60;
let inactiveCategory = 'all';
const MIN_BALANCE = 50000;  // 5만원 이하 제외

// 축종 수동 매핑 캐시 (Firestore에서 로드)
let 축종매핑 = {};  // { 회사명: '양계' | '양돈' | '축우' | ... }
let 거래처추론축종 = {};  // { 회사명: '양계' } - 제품 구매이력 기반 자동 추론

// 축종 매핑 Firestore에서 로드
async function loadCategoryMap() {
  const { collection, query, getDocs, limit } = window.fbFuncs;
  try {
    const snap = await getDocs(query(collection(window.fbdb, '축종매핑'), limit(2000)));
    축종매핑 = {};
    snap.docs.forEach(d => {
      const r = d.data();
      if (r.회사 && r.축종) 축종매핑[r.회사] = r.축종;
    });
    console.log(`축종매핑 로드: ${Object.keys(축종매핑).length}개`);
  } catch(e) {
    console.warn('축종매핑 로드 실패', e);
  }
}

// 제품 구매이력 기반 거래처 축종 추론
// 각 거래처가 산 제품들의 축종을 집계, 가장 많이 산 축종으로 판단 (공통/미지정 제외)
async function inferCompanySpecies() {
  const { collection, query, getDocs, where, orderBy, limit } = window.fbFuncs;
  try {
    // 제품축종이 로드 안 됐으면 먼저 로드
    if (Object.keys(제품축종).length === 0) await loadProductSpecies();
    // 지정된 제품이 하나도 없으면 추론 불가
    if (Object.keys(제품축종).length === 0) { 거래처추론축종 = {}; return; }
    
    // 매출 세부내역 전체 조회
    const snap = await getDocs(query(collection(window.fbdb,'전표_세부'), where('계정','==','매출'), orderBy('날짜','desc'), limit(10000)));
    
    // 회사별 축종 카운트
    const counter = {};  // { 회사: { 양계: n, 양돈: n, 축우: n } }
    snap.docs.forEach(d => {
      const r = d.data();
      const 회사 = r.회사; const 품명 = r.품명;
      if (!회사 || !품명) return;
      const sp = 제품축종[품명];
      // 양계/양돈/축우만 카운트 (공통/미지정 제외)
      if (sp !== '양계' && sp !== '양돈' && sp !== '축우') return;
      counter[회사] = counter[회사] || {};
      counter[회사][sp] = (counter[회사][sp] || 0) + 1;
    });
    
    // 가장 많은 축종으로 결정
    거래처추론축종 = {};
    for (const [회사, counts] of Object.entries(counter)) {
      let best = null, bestN = 0;
      for (const [sp, n] of Object.entries(counts)) {
        if (n > bestN) { best = sp; bestN = n; }
      }
      if (best) 거래처추론축종[회사] = best;
    }
    console.log(`거래처 축종 추론: ${Object.keys(거래처추론축종).length}개`);
  } catch(e) {
    console.warn('거래처 축종 추론 실패', e);
  }
}

// 축종 매핑 저장 (개별)
async function saveCategoryMapping(회사, 축종) {
  const { doc, setDoc, deleteDoc } = window.fbFuncs;
  const safeId = 회사.replace(/\//g,'_').replace(/\./g,'_');
  const ref = doc(window.fbdb, '축종매핑', safeId);
  try {
    if (축종 === 'auto') {
      // 자동으로 되돌리기 - 매핑 삭제
      await deleteDoc(ref);
      delete 축종매핑[회사];
    } else {
      await setDoc(ref, { 회사, 축종, 갱신일시: new Date().toISOString() });
      축종매핑[회사] = 축종;
    }
    return true;
  } catch(e) {
    alert('저장 실패: ' + e.message);
    console.error(e);
    return false;
  }
}
window.saveCategoryMapping = saveCategoryMapping;

// 회사명 기반 자동 분류 (수동 매핑 > 제품추론 > 회사명 순)
function classifyCompany(name) {
  if (!name) return '미분류';
  // 1) 수동 매핑 최우선
  if (축종매핑[name]) return 축종매핑[name];
  // 2) 제품 구매이력 기반 추론
  if (거래처추론축종[name]) return 거래처추론축종[name];
  // 3) 회사명 자동 분류
  const n = name.toLowerCase();
  if (n.includes('양견') || n.startsWith('양견-')) return '양견';
  if (n.includes('한우') || n.startsWith('ch-') || n.startsWith('cc-') ||
      n.includes('축우') || n.includes('젖소') || n.includes('한육우') || n.includes('목장')) return '축우';
  if (n.includes('양계') || n.includes('계농') || n.includes('산란')) return '양계';
  if (n.includes('양돈') || n.includes('돈장') || n.includes('돼지') || n.includes('축돈')) return '양돈';
  if (n.includes('동물') || n.includes('수의') || n.includes('약품')) return '동물병원/유통';
  return '미분류';
}

async function searchInactive() {
  loading('inactive-result');
  
  const { collection, query, getDocs, where, limit } = window.fbFuncs;
  
  try {
    // 축종 매핑 + 제품 구매 기반 추론 재로드
    await loadCategoryMap();
    await inferCompanySpecies();
    
    // 잔액 컬렉션 (전체 기간 반영) + 거래처 마스터 병렬 조회
    const balColl = collection(window.fbdb, '잔액');
    const custColl = collection(window.fbdb, '거래처');
    const [balSnap, custSnap] = await Promise.all([
      getDocs(query(balColl, limit(2000))),
      getDocs(query(custColl, limit(2000)))
    ]);
    
    // 거래처 정보 맵
    const custMap = new Map();
    custSnap.docs.forEach(d => {
      const r = d.data();
      if (r.회사) custMap.set(r.회사, { 이름: r.이름 || '', 전화: r.전화1 || '', 담당사원: r.담당사원 || '' });
    });
    
    // 오늘 기준 미거래 일수 계산
    const today = new Date();
    today.setHours(0,0,0,0);
    
    let items = balSnap.docs
      .map(d => d.data())
      .filter(r => r.최종매출일)  // 매출 이력 있는 것만
      .map(r => {
        const lastDate = new Date(r.최종매출일);
        const diffDays = Math.floor((today - lastDate) / (1000*60*60*24));
        const info = custMap.get(r.회사) || {};
        return {
          ...r,
          미거래일수: diffDays,
          이름: info.이름,
          전화: info.전화,
          담당사원: info.담당사원,
          축종: classifyCompany(r.회사),
        };
      });
    
    // 기간 필터
    items = items.filter(r => r.미거래일수 >= inactiveDays);
    
    // 잔액 5만원 초과만 (5만원 이하 자동 제외)
    items = items.filter(r => r.잔액 > MIN_BALANCE);
    
    // 양견 카테고리는 미거래 관리에서 자동 제외 (별도 검색 시에는 표시)
    if (inactiveCategory !== '양견') {
      items = items.filter(r => r.축종 !== '양견');
    }
    
    // 축종 필터
    if (inactiveCategory !== 'all') {
      items = items.filter(r => r.축종 === inactiveCategory);
    }
    
    // 미거래일수 큰 순 정렬
    items.sort((a,b) => b.미거래일수 - a.미거래일수);
    
    if (!items.length) { empty('inactive-result'); return; }
    
    // 통계 요약
    const totalUnpaid = items.reduce((s,r) => s + r.잔액, 0);
    
    // 축종별 집계
    const catStats = {};
    items.forEach(r => {
      catStats[r.축종] = catStats[r.축종] || { 수: 0, 금액: 0 };
      catStats[r.축종].수 += 1;

      </div>
      <div style="margin-bottom:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px">
        ${catBadges || '<span style="color:var(--text3);font-size:11px">데이터 없음</span>'}
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">
        ${items.length}개 거래처 · 5만원 이하 자동 제외 · 미거래일수 오래된 순 · 
        <span style="color:#f0d050">60일↑</span> · 
        <span style="color:var(--amber)">90일↑</span> · 
        <span style="color:var(--red)">120일↑</span>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>거래처 (담당자)</th><th>축종</th><th class="num">미거래 ▼</th><th>최종거래</th><th class="num">잔액</th><th class="hide-mobile">전화</th><th class="hide-mobile">담당사원</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  } catch(e) {
    document.getElementById('inactive-result').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    console.error(e);
  }
}
window.searchInactive = searchInactive;

// ── 거래처 정보 ────────────────────────────────
async function searchInfo() {
  const q = document.getElementById('info-q').value.trim().toLowerCase();
  loading('info-result');
  
  const { collection, query, getDocs, limit } = window.fbFuncs;
  const coll = collection(window.fbdb, '거래처');
  
  try {
    const snap = await getDocs(query(coll, limit(2000)));
    let items = snap.docs.map(d => d.data());
    
    // 회사명 또는 담당자 이름으로 검색
    if (q) items = items.filter(r => 
      (r.회사||'').toLowerCase().includes(q) ||
      (r.이름||'').toLowerCase().includes(q)
    );
    
    // 회사명 오름차순 정렬
    items.sort((a,b) => (a.회사||'').localeCompare(b.회사||''));
    
    if (!items.length) { empty('info-result'); return; }
    
    const rows = items.slice(0, 300).map(r => `<tr>
      <td><strong>${r.회사||''}</strong></td>
      <td>${r.이름||''}</td>
      <td>${r.전화1||''}</td>
      <td class="hide-mobile">${r.분류||''}</td>
      <td class="hide-mobile" style="font-size:11px;color:var(--text3)">${r.주소||''}</td>
      <td>${r.담당사원||''}</td>
    </tr>`).join('');
    
    document.getElementById('info-result').innerHTML = `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">${items.length}개 거래처 · 회사명/담당자명 검색</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>거래처</th><th>담당자</th><th>전화</th><th class="hide-mobile">분류</th><th class="hide-mobile">주소</th><th>담당사원</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  } catch(e) {
    document.getElementById('info-result').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}
window.searchInfo = searchInfo;
</script>
</body>
</html>
